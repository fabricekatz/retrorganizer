name: CI
on:
  push: { branches: [main] }
  pull_request: {}

# Least privilege: the workflow only reads the repo; the token gets no write scopes.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to full commit SHAs (a mutable tag like @v4 can be
      # repointed at malicious code); the trailing comment names the release.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: 22, cache: pnpm }
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with: { distribution: temurin, java-version: '21' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - name: Run tests (with Firestore emulator)
        run: pnpm exec firebase emulators:exec --only auth,firestore "pnpm test"
      - name: Run DST recurrence tests in a DST timezone
        # The runner defaults to UTC, where the DST test is a no-op. Force a
        # DST timezone so a regression to UTC-anchored recurrence fails here.
        env: { TZ: Europe/Paris }
        run: pnpm --filter @retrorganizer/core test -- recurrenceDst
