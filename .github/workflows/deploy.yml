name: Deploy
on:
  push: { branches: [main] }

# Least privilege: deploy reads the repo and authenticates to Firebase via a
# service-account secret; it needs no write scopes on GITHUB_TOKEN.
permissions:
  contents: read

# Avoid overlapping deploys racing each other.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Gate: skip cleanly (green) until the FIREBASE_SERVICE_ACCOUNT secret is
      # configured, so this workflow never fails for repos that haven't set up
      # deployment. See docs/deployment.md. (Only the boolean is emitted, never
      # the secret value.)
      - name: Check deploy is configured
        id: guard
        run: echo "enabled=${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}" >> "$GITHUB_OUTPUT"

      - name: Note skipped deploy
        if: steps.guard.outputs.enabled != 'true'
        run: echo "::notice::FIREBASE_SERVICE_ACCOUNT secret not set — skipping deploy. See docs/deployment.md to enable it."

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: steps.guard.outputs.enabled == 'true'
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        if: steps.guard.outputs.enabled == 'true'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: steps.guard.outputs.enabled == 'true'
        with: { node-version: 22, cache: pnpm }

      - name: Install dependencies
        if: steps.guard.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build web (production)
        if: steps.guard.outputs.enabled == 'true'
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_USE_EMULATORS: "false"
        run: pnpm --filter @retrorganizer/web build

      - name: Deploy hosting + Firestore rules & indexes
        if: steps.guard.outputs.enabled == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          # Remove the credential file on exit whether the deploy succeeds or fails.
          trap 'rm -f "$RUNNER_TEMP/sa.json"' EXIT
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          pnpm exec firebase deploy \
            --only hosting,firestore:rules,firestore:indexes \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
